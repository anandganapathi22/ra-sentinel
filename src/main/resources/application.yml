spring:
  application:
    name: ra-sentinel
  sql:
    init:
      mode: never

server:
  port: 8080

rasentinel:
  ai:
    enabled: true
    api-key: ${RA_SENTINEL_AI_API_KEY:}
    model: claude-opus-4-8
    effort: low
    timeout-ms: 8000

management:
  endpoints:
    web:
      exposure:
        include: health,info
